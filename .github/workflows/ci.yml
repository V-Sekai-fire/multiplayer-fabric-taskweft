name: Taskweft CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: taskweft-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: mix test
    runs-on: ubuntu-latest

    env:
      MIX_ENV: test
      TEST_DATABASE_URL: "postgresql://root@localhost:26257/taskweft_test?sslmode=disable"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Cache Mix deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-taskweft-mix-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-taskweft-mix-

      - name: Start CockroachDB
        run: |
          docker run -d --name crdb \
            -p 26257:26257 -p 8080:8080 \
            ghcr.io/v-sekai/cockroach:latest \
            start-single-node --insecure \
            --listen-addr=0.0.0.0:26257 \
            --http-addr=0.0.0.0:8080
          for i in $(seq 1 60); do
            docker exec crdb cockroach sql --insecure -e "SELECT 1" 2>/dev/null && break
            sleep 1
          done
          docker exec crdb cockroach sql --insecure -e "SELECT 1" || (docker logs crdb && exit 1)

      - name: Create test database
        run: docker exec crdb cockroach sql --insecure -e "CREATE DATABASE IF NOT EXISTS taskweft_test;"

      - name: Install dependencies
        run: mix deps.get

      - name: Compile (builds C++20 NIF via elixir_make)
        run: mix compile --warnings-as-errors

      - name: Check formatting
        run: mix format --check-formatted

      - name: Run tests
        run: mix test --trace
