name: Taskweft CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: taskweft-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: mix test
    runs-on: ubuntu-latest

    env:
      MIX_ENV: test
      TEST_DATABASE_URL: "postgresql://root@localhost:26257/taskweft_test?sslmode=disable"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Cache Mix deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-taskweft-mix-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-taskweft-mix-

      - name: Install CockroachDB
        run: |
          curl -fsSL https://binaries.cockroachdb.com/cockroach-v23.2.3.linux-amd64.tgz | tar xz
          sudo cp cockroach-v23.2.3.linux-amd64/cockroach /usr/local/bin/

      - name: Start CockroachDB
        run: |
          cockroach start-single-node --insecure --background \
            --listen-addr=localhost:26257 --http-addr=localhost:8080
          until cockroach sql --insecure --execute="SELECT 1" 2>/dev/null; do sleep 1; done

      - name: Create test database
        run: cockroach sql --insecure --execute="CREATE DATABASE IF NOT EXISTS taskweft_test;"

      - name: Install dependencies
        run: mix deps.get

      - name: Compile (builds C++20 NIF via elixir_make)
        run: mix compile --warnings-as-errors

      - name: Check formatting
        run: mix format --check-formatted

      - name: Run tests
        run: mix test --trace
